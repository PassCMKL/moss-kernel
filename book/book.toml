[book]
title = "Moss Kernel: An Introduction to Operating Systems"
authors = ["Moss Kernel Contributors"]
description = "A hands-on guide to operating system concepts through the Moss kernel, a Unix-like OS written in Rust."
language = "en"
src = "src"

[rust]
edition = "2024"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/moss-kernel/moss-kernel"
edit-url-template = "https://github.com/moss-kernel/moss-kernel/edit/master/book/src/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
